name: CI

on:
  pull_request:
    branches: [main]

jobs:
  validate-commits:
    name: Validate commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Check commit subjects
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          while read -r subject; do
            case "$subject" in
              fixup!*|squash!*|amend!*) continue ;;
            esac
            if ! printf '%s' "$subject" | grep -qE '^[^[:alnum:][:space:]][^[:space:]]* [A-Z]'; then
              echo "::error::Invalid commit subject: $subject"
              exit 1
            fi
          done < <(git log --no-merges --format='%s' "$BASE_SHA..$HEAD_SHA")

  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-04-25
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo build --verbose
      - run: cargo test --verbose
