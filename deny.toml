[graph]
all-features = true

[advisories]
yanked = "deny"

# YAGNI: only allow licenses that the current dependency graph actually
# requires. Add new entries individually when a real dependency demands one.
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
